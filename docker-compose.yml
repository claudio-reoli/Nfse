services:
  postgres:
    image: postgres:16-alpine
    container_name: nfse-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: nfse
      POSTGRES_USER: nfse
      POSTGRES_PASSWORD: nfse_dev
      TZ: America/Sao_Paulo
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
